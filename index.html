</style></head><body><header class="top"><div class="logo">字</div><div class="title"><b>字游记</b><small>每天认识一点点</small></div><span class="offline">✓ 离线可用</span></header><main class="wrap"><div class="tabs"><button class="on" onclick="view('learn',this)">今日学习</button><button onclick="view('path',this)">1900字地图</button></div><section id="learn"><div class="hello"><div><h1>你好，小小识字家！👋</h1><p>从大自然开始，今天认识 12 个汉字。</p></div><div class="progress"><span>今日进度</span><b id="pc">0 / 12</b><div class="bar"><i id="pi"></i></div></div></div><div class="layout"><aside class="panel"><h3>第一课 · 天地自然</h3><div class="grid" id="grid"></div><div class="goal"><span>本周目标</span><b id="weekly">0 / 30字</b><div class="bar"><i id="wi"></i></div><p>坚持学习，周末会解锁小奖章！</p></div></aside><article class="study"><div class="study-head"><span>看图识字</span><button onclick="speak(current.char+'，'+current.words.join('，'))">🔊 听一听</button></div><div class="picture" id="pic"></div><div class="char"><button id="char" onclick="speak(current.char)"></button><div><b id="py"></b><span>象形字 · 基础常用字</span></div></div><div class="words"><p>跟我读词语</p><div class="wordgrid" id="words"></div></div><div class="sentence" id="sentence"></div><div class="tip" id="tip"></div><div class="actions"><button class="hint" onclick="toggleTip()">💡 记忆小窍门</button><button class="know" onclick="learned()">我认识了 →</button></div></article><aside class="side"><div class="streak">🔥 连续学习<b>3 天</b></div><div><h3>学习计划</h3><ul class="stages"><li>天地自然 <b>12字</b></li><li>我的身体 <b>12字</b></li><li>数字朋友 <b>12字</b></li></ul></div><div class="quote">“积少成多，每天进步一点点。” 🌱</div></aside></div></section><section class="path" id="path"><div class="hello"><div><h1>1900 字系统成长地图</h1><p>从具体常见的字开始，逐步走向自主阅读。</p></div></div><div class="stagecards" id="stages"></div></section></main><script>
const data=[['日','rì','☀️',['日出','日光','生日'],'红日从东方升起。','太阳就是“日”最早的样子'],['月','yuè','🌙',['月亮','月光','明月'],'月亮弯弯挂在天上。','弯弯的月牙变成了“月”'],['山','shān','⛰️',['高山','山林','上山'],'远处有一座高山。','三个山峰排在一起'],['水','shuǐ','💧',['河水','水果','开水'],'小河里的水清清的。','中间是水流，两边是水花'],['火','huǒ','🔥',['火苗','火车','大火'],'火苗轻轻地跳动。','像一团向上燃烧的火焰'],['木','mù','🌳',['树木','木头','木马'],'树林里有许多树木。','一横是枝，一撇一捺是根'],['人','rén','🧍',['大人','人民','主人'],'我们都是中国人。','像一个迈步走路的人'],['口','kǒu','👄',['门口','开口','人口'],'小鸟张开了口。','方方的轮廓像一张嘴'],['田','tián','🌾',['田地','水田','田野'],'农民伯伯在田里劳动。','像分成四块的田地'],['雨','yǔ','🌧️',['下雨','雨水','大雨'],'春雨沙沙地下着。','云层下面落下雨点'],['鸟','niǎo','🐦',['小鸟','鸟儿','飞鸟'],'小鸟在枝头唱歌。','记住头上的一点和尾巴'],['鱼','yú','🐟',['小鱼','金鱼','鱼群'],'小鱼在水里游来游去。','上面是鱼头，下面是鱼尾']].map(x=>({char:x[0],pinyin:x[1],image:x[2],words:x[3],sentence:x[4],tip:x[5]}));let idx=0,current=data[0],done=JSON.parse(localStorage.getItem('ziyou-offline')||'[]');const grid=document.getElementById('grid');function renderGrid(){grid.innerHTML=data.map((x,i)=>`<button class="${i==idx?'on':''} ${done.includes(i)?'done':''}" onclick="select(${i})"><span>${x.image}</span><b>${x.char}</b><small>${x.pinyin}</small></button>`).join('')}function select(i){idx=i;current=data[i];document.getElementById('pic').textContent=current.image;document.getElementById('char').textContent=current.char;document.getElementById('py').textContent=current.pinyin;document.getElementById('words').innerHTML=current.words.map(w=>`<button onclick="speak('${w}')">${w}　🔊</button>`).join('');document.getElementById('sentence').innerHTML=`读一读　${current.sentence} <button onclick="speak(current.sentence)">🔊</button>`;document.getElementById('tip').textContent='💡 '+current.tip;document.getElementById('tip').style.display='none';renderGrid()}function speak(t){if(speechSynthesis){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='zh-CN';u.rate=.78;speechSynthesis.speak(u)}}function learned(){if(!done.includes(idx)){done.push(idx);localStorage.setItem('ziyou-offline',JSON.stringify(done))}update();select((idx+1)%data.length)}function update(){document.getElementById('pc').textContent=done.length+' / 12';document.getElementById('pi').style.width=done.length/12*100+'%';document.getElementById('weekly').textContent=done.length+' / 30字';document.getElementById('wi').style.width=done.length/30*100+'%'}function toggleTip(){let x=document.getElementById('tip');x.style.display=x.style.display==='block'?'none':'block'}function view(id,b){document.getElementById('learn').style.display=id==='learn'?'block':'none';document.getElementById('path').style.display=id==='path'?'block':'none';document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('on'));b.classList.add('on')}const ss=[['一年级上','启蒙象形','1–150字','自然、身体、数字与校园','#ff7659'],['一年级下','生活常用','151–400字','家庭、动作、方位与时间','#f0a832'],['二年级上','基础阅读','401–750字','高频词、短句与童话','#28ad92'],['二年级下','主题拓展','751–1100字','自然、社会与品格','#4c8df6'],['三年级上','自主阅读','1101–1500字','书面语、成语与段落','#8267d8'],['三年级下','巩固进阶','1501–1900字','易错字、近义词与阅读','#e46b98']];document.getElementById('stages').innerHTML=ss.map(s=>`<div class="stagecard" style="--c:${s[4]}"><small>${s[0]}</small><h2>${s[1]}</h2><b>${s[2]}</b><p>${s[3]}</p></div>`).join('');select(0);update();
</script>

<script>
(function buildCompleteCurriculum(){
 const stageTargets=[150,400,750,1100,1500,1900];
 const stageTerms=['一年级上','一年级下','二年级上','二年级下','三年级上','三年级下'];
 const themeNames=[
  ['启蒙象形','身边事物','校园生活','数字方位'],
  ['家庭生活','动作表达','时间季节','城市乡村','安全健康','故事天地'],
  ['自然观察','人物品格','阅读高频','劳动实践','科学启蒙','童话世界'],
  ['社会生活','山河大地','情感表达','传统文化','植物动物','句子阅读'],
  ['书面表达','成语基础','科学社会','历史文化','阅读进阶','写作积累'],
  ['易错字词','近义反义','成语拓展','综合阅读','表达运用','毕业巩固']
 ];
 const used=new Set();
 lessons.forEach((lesson,li)=>{lesson.stageIndex=0;lesson.items=lesson.items.filter(item=>{if(used.has(item.char))return false;used.add(item.char);return true})});
 for(let stage=0;stage<stageTargets.length;stage++){
   const target=stageTargets[stage];let chapter=lessons.filter(x=>x.stageIndex===stage).length;
   while(used.size<target){
     const room=Math.min(12,target-used.size);const items=[];
     for(const item of window.FULL_CHARACTER_BANK){
       if(!used.has(item.char)){used.add(item.char);items.push(item);if(items.length===room)break}
     }
     chapter++;
     const theme=themeNames[stage][(chapter-1)%themeNames[stage].length];
     lessons.push({stageIndex:stage,title:stageTerms[stage]+' · 第'+chapter+'课',intro:theme+'主题识字，本课学习 '+items.length+' 个常用字。',items});
   }
 }
 lessons.forEach((lesson,i)=>lesson.globalIndex=i);
 document.getElementById('lessonSelect').innerHTML=lessons.map((l,i)=>'<option value="'+i+'">'+l.title+'</option>').join('');
 const stageStarts=stageTerms.map((_,s)=>lessons.findIndex(l=>l.stageIndex===s));
 openStage=function(s){view('learn',document.querySelector('.tabs button'));loadLesson(stageStarts[s]);window.scrollTo({top:0,behavior:'smooth'})};
 const originalLoad=loadLesson;
 loadLesson=function(n){originalLoad(n);const l=lessons[n];document.querySelector('#learn .hello h1').textContent=l.stageIndex===0?'你好，小小识字家！ 👋':stageTerms[l.stageIndex]+' · 系统识字';document.querySelector('.goal span').textContent='本课目标';document.getElementById('weekly').textContent=done.length+' / '+data.length+'字';document.getElementById('wi').style.width=(done.length/data.length*100)+'%'};
 const originalUpdate=update;
 update=function(){originalUpdate();document.getElementById('pc').textContent=done.length+' / '+data.length;document.getElementById('pi').style.width=(done.length/data.length*100)+'%';document.getElementById('weekly').textContent=done.length+' / '+data.length+'字';document.getElementById('wi').style.width=(done.length/data.length*100)+'%'};
 const map=document.querySelector('.path .hello p');map.textContent='完整收录 1900 个不重复常用字，共 '+lessons.length+' 课；按年级阶段循序渐进学习。';
 const badge=document.createElement('div');badge.style.cssText='margin-top:12px;color:#258b75;font-weight:800;font-size:13px';badge.textContent='✓ 已录入 '+used.size+' 字 · '+lessons.length+' 课';map.parentElement.appendChild(badge);
 loadLesson(0);
})();
</script>

 }
 window.startPractice=function(){
   const source=shuffle(data).slice(0,Math.min(10,data.length));questions=source.map(makeQuestion);qIndex=0;qScore=0;answered=false;renderQuestion();
 };
 function renderQuestion(){
   const box=document.getElementById('questionBox');document.getElementById('qscore').textContent='得分 '+qScore;document.getElementById('qbar').style.width=((qIndex+1)/questions.length*100)+'%';
   if(qIndex>=questions.length){const rate=Math.round(qScore/questions.length*100);box.innerHTML='<div class="result"><span>'+(rate>=80?'🏆':'🌟')+'</span><h2>完成啦！正确率 '+rate+'%</h2><p>'+(rate>=80?'掌握得很棒，继续保持！':'再复习一次，会记得更牢。')+'</p><button onclick="startPractice()">再练一轮</button></div>';return}
   const q=questions[qIndex];const labels={image:'看图选字',pinyin:'拼音选字',word:'词语找字'};
   const prompt=q.type==='image'?'<div class="question-visual">'+q.item.image+'</div>':q.type==='pinyin'?'<div class="question-word">'+q.item.pinyin+'</div>':'<div class="question-word">'+q.item.words[0]+'</div>';
   box.innerHTML='<div class="question"><small>第 '+(qIndex+1)+' / '+questions.length+' 题 · '+labels[q.type]+'</small><h3>'+(q.type==='image'?'这幅图对应哪个字？':q.type==='pinyin'?'请选择正确的汉字':'这个词语里要学习的字是？')+'</h3>'+prompt+'</div><div class="choices">'+q.choices.map(x=>'<button data-char="'+x.char+'">'+x.char+'</button>').join('')+'</div><div class="feedback" id="feedback"></div><button class="next-q" id="nextQ">下一题 →</button>';
   box.querySelectorAll('.choices button').forEach(btn=>btn.onclick=function(){if(answered)return;answered=true;const ok=this.dataset.char===q.item.char;box.querySelectorAll('.choices button').forEach(x=>{if(x.dataset.char===q.item.char)x.classList.add('correct')});if(!ok)this.classList.add('wrong');if(ok)qScore++;const fb=document.getElementById('feedback');fb.className='feedback '+(ok?'good':'bad');fb.textContent=ok?'✓ 答对了！':'再记一记，正确答案是“'+q.item.char+'”';speak(q.item.char+'，'+q.item.words[0]);document.getElementById('qscore').textContent='得分 '+qScore;document.getElementById('nextQ').style.display='block'});
   document.getElementById('nextQ').onclick=function(){qIndex++;answered=false;renderQuestion()};
 }
})();
</script></body></html>
